{% extends "core/base.html" %}

{% block title %}
    All products
{% endblock title %}

{% block content %}
    <div class="row">
        <div class="col-md-12">
            <h3>Product list</h3>
            {% if messages %}
                {% include "core/components/message.html" %}
            {% endif %}
            <ul>
                {% for product in products %}
                    <li><a href="{% url "product_detail" product.pk %}">{{ product.name }}</a></li>
                {% endfor %}
            </ul>
        </div>
    </div>
{% endblock content %}
