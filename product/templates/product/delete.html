{% extends "core/base.html" %}

{% block title %}
    Delete {{ product.name }}
{% endblock title %}

{% block content %}
    <div class="row">
        <div class="col-md-12">
            <h3>Delete product</h3>
            <p>Are you sure you want to delete product {{product.name}}?</p>
            <form method="post">
                {% csrf_token %}
                
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url "product_detail" product.pk %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
{% endblock content %}
