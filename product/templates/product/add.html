{% extends "core/base.html" %}

{% block title %}
    Add product
{% endblock title %}


{% block content %}
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <h3>Add new product</h3>
            {% if messages %}
                {% include "core/components/message.html" %}
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                {% include "core/components/form.html" %}
                <button type="submit" class="btn btn-success w-100">
                    {% if request.resolver_match.url_name == 'product_edit' %} Update {% else %} Add {% endif %}
                </button>
            </form>
        </div>
    </div>
{% endblock content %}
