{% extends "core/base.html" %}

{% block title %}
    Password reset
{% endblock title %}

{% block content %}
    <div class="row">
        <div class="col-md-4 offset-md-4 p-5 shadow rounded">
            <h3 class="text-center">Password your reset</h3>
            {% if messages %}
                {% include "core/components/message.html" %}
            {% endif %}
            <form action="{% url "password_reset" %}" method="post" novalidate>
                {% include "core/components/form.html" %}
                <button type="submit" class="btn btn-success w-100">Send password reset link</button>
            </form>
        </div>
    </div>
{% endblock content %}
