{% extends "core/base.html" %}

{% block title %}
    Confirm reset password
{% endblock title %}

{% block content %}
    <div class="row">
        <div class="col-md-4 offset-md-4 p-5 shadow rounded">
            <h3 class="text-center">Set new password</h3>
            {% if messages %}
                {% include "core/components/message.html" %}
            {% endif %}

            <form method="post" novalidate>
                {% include "core/components/form.html" %}
                <button type="submit" class="btn btn-success w-100">Set password</button>
            </form>
        </div>
    </div>
{% endblock content %}
