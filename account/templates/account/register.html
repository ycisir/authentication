{% extends "core/base.html" %}

{% block title %}
    Register
{% endblock title %}

{% block content %}
    <div class="row">
        <div class="col-md-4 offset-md-4 p-5 shadow rounded">
            <h3 class="text-center">Create an Account</h3>
            {% if messages %}
                {% include "core/components/message.html" %}
            {% endif %}

            <form action="{% url "register_user" %}" method="post" novalidate>
                {% include "core/components/form.html" %}
                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>

            <p class="text-center mt-3">Already have an account? <a href="{% url "login_user" %}">Login here</a></p>
        </div>
    </div>
{% endblock content %}
